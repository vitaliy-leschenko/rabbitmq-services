name: Build and Publish NuGet

on:
  push:
    tags:
      - '*'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            9.x
            10.x

      - name: Restore
        run: dotnet restore src/RabbitMQ.sln

      - name: Build
        run: >
          dotnet build src/RabbitMQ.Services/RabbitMQ.Services.csproj
          -c Release
          --no-restore

      - name: Pack
        run: >
          dotnet pack src/RabbitMQ.Services/RabbitMQ.Services.csproj
          -c Release
          -p:PackageVersion=${{ github.ref_name }}
          --no-build
          --no-restore
          --output ./artifacts

      - name: Get NuGet API token
        id: nuget-auth
        run: |
          set -e
          oidc_token=$(curl -sSfL \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=api://AzureADTokenExchange" \
            | jq -r '.value')
          if [ -z "$oidc_token" ] || [ "$oidc_token" = "null" ]; then
            echo "Failed to obtain OIDC token" >&2
            exit 1
          fi
          api_key=$(curl -sSfL -X POST \
            "https://www.nuget.org/api/v1/authentication/token" \
            -H "Content-Type: application/json" \
            -d "{\"EncodedJwt\": \"$oidc_token\"}" \
            | jq -r '.token')
          if [ -z "$api_key" ] || [ "$api_key" = "null" ]; then
            echo "Failed to obtain NuGet API key from OIDC token exchange" >&2
            exit 1
          fi
          echo "::add-mask::$api_key"
          echo "api_key=$api_key" >> "$GITHUB_OUTPUT"

      - name: Publish to NuGet.org
        run: >
          dotnet nuget push ./artifacts/*.nupkg
          --api-key ${{ steps.nuget-auth.outputs.api_key }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
